<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile — VIGORWOLF</title>
  <link rel="icon" type="image/png" href="/assets/media/favicon.png?v=7">
  <link rel="stylesheet" href="/assets/css/styles.css?v=7">
</head>
<body>
  <header id="site-header"></header>
  <main>
    <section class="section">
      <div class="container" style="max-width:720px">
        <div class="flex between center wrap gap-16 mb-24">
          <div><span class="eyebrow">Your Account</span><h1 class="display mt-8" data-hi>Profile</h1></div>
          <button class="btn btn--ghost btn--sm" data-logout>Logout</button>
        </div>

        <div class="panel mb-24" data-points-panel style="border-color:var(--line-2)">
          <div class="flex between center wrap gap-16">
            <div>
              <span class="eyebrow eyebrow--plain">Loyalty Points</span>
              <div class="display mt-8" style="font-size:2.2rem"><span data-points>0</span> <span style="font-size:1rem;color:var(--muted)">pts</span></div>
            </div>
            <div style="text-align:right">
              <span class="eyebrow eyebrow--plain">Worth</span>
              <div class="display mt-8" style="font-size:1.6rem" data-points-jd>0.00 JD</div>
            </div>
          </div>
          <p class="form-note mt-16">Earn 100 points for every 10 JD spent · 100 points = 1 JD off your next order.</p>
        </div>

        <form class="panel" data-profile>
          <h3 class="display mb-16" style="font-size:1.3rem">Details</h3>
          <div class="field"><label>Full Name</label><input class="input" name="name"></div>
          <div class="field"><label>Email</label><input class="input" name="email" disabled></div>
          <div class="form-2col">
            <div class="field"><label>Phone</label><input class="input" name="phone"></div>
            <div class="field"><label>City</label><input class="input" name="city"></div>
          </div>
          <div class="field"><label>Address</label><input class="input" name="address"></div>
          <button class="btn" type="submit">Save Changes</button>
        </form>

        <div class="flex gap-16 wrap mt-24">
          <a class="btn btn--ghost" href="/orders.html">My Orders</a>
          <a class="btn btn--ghost" href="/wishlist.html">Wishlist</a>
        </div>
      </div>
    </section>
  </main>
  <footer id="site-footer"></footer>

  <script src="/assets/js/config.js?v=7"></script>
  <script src="/assets/js/api.js?v=7"></script>
  <script src="/assets/js/store.js?v=7"></script>
  <script src="/assets/js/ui.js?v=7"></script>
  <script>
    const form = document.querySelector("[data-profile]");
    (async () => {
      // Protect page — validate the real session with the server.
      const p = await VW.User.me();
      if (!p) { location.href = "/login.html?next=/profile.html"; return; }

      document.querySelector("[data-hi]").textContent = (p.name || "Profile").split(" ")[0];
      ["name","email","phone","city","address"].forEach(k => { if (form[k]) form[k].value = p[k] || ""; });

      // Loyalty points come straight from the account record.
      document.querySelector("[data-points]").textContent = p.points || 0;
      document.querySelector("[data-points-jd]").textContent = VW.money((p.points || 0) / 100);

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = form.querySelector("button[type=submit]");
        btn.setAttribute("data-loading", "1"); btn.disabled = true;
        try {
          await VW.User.update({
            name: form.name.value.trim(), phone: form.phone.value.trim(),
            city: form.city.value.trim(), address: form.address.value.trim(),
          });
          VW.toast("Profile saved", "ok");
          document.querySelector("[data-hi]").textContent = (form.name.value || "Profile").split(" ")[0];
        } catch (ex) { VW.toast(ex.message || "Could not save"); }
        finally { btn.removeAttribute("data-loading"); btn.disabled = false; }
      });
    })();

    document.querySelector("[data-logout]").addEventListener("click", async () => {
      await VW.User.logout(); location.href = "/";
    });
  </script>
</body>
</html>
