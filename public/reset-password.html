<body>
  <header id="site-header"></header>
  <main>
    <div class="container">
      <div class="auth-wrap">
        <div class="text-center mb-24">
          <span class="eyebrow eyebrow--plain" style="justify-content:center">Account Recovery</span>
          <h1 class="display mt-8">Set New Password</h1>
        </div>
        <form class="panel" data-reset novalidate>
          <div class="field"><label>New Password <span class="req">*</span></label><input class="input" name="password" type="password" minlength="6" autocomplete="new-password" required></div>
          <div class="field"><label>Confirm Password <span class="req">*</span></label><input class="input" name="confirm" type="password" autocomplete="new-password" required></div>
          <p class="field-error mb-16" data-error></p>
          <button class="btn btn--block btn--lg" type="submit" data-submit>Update Password</button>
          <div class="divider"></div>
          <p class="form-note text-center"><a class="link-underline" href="/login.html">Back to login</a></p>
        </form>
      </div>
    </div>
  </main>
  <footer id="site-footer"></footer>

  <script src="/assets/js/config.js?v=8"></script>
  <script src="/assets/js/api.js?v=8"></script>
  <script src="/assets/js/store.js?v=8"></script>
  <script src="/assets/js/ui.js?v=8"></script>
  <script>
    const form = document.querySelector("[data-reset]");
    const err = document.querySelector("[data-error]");
    const token = new URLSearchParams(location.search).get("token") || "";
    if (!token) { err.textContent = "This reset link is missing its token. Request a new one from the login page."; }

    form.addEventListener("submit", async (e) => {
      e.preventDefault(); err.textContent = "";
      const pw = form.password.value, confirm = form.confirm.value;
      if (pw.length < 6) { err.textContent = "Password must be at least 6 characters."; return; }
      if (pw !== confirm) { err.textContent = "Passwords do not match."; return; }
      if (!token) { err.textContent = "Missing reset token."; return; }
      const btn = form.querySelector("[data-submit]");
      btn.setAttribute("data-loading", "1"); btn.disabled = true;
      try {
        const r = await API.auth.reset(token, pw);
        // Signed in automatically by the server; refresh the cached session.
        try { await VW.User.me(); } catch {}
        VW.toast("Password updated — you're signed in", "ok");
        location.href = "/profile.html";
      } catch (ex) {
        err.textContent = ex.message || "This reset link is invalid or expired.";
        btn.removeAttribute("data-loading"); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
