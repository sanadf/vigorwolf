<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password — VIGORWOLF</title>
  <link rel="icon" type="image/png" href="/assets/media/favicon.png?v=8">
  <link rel="stylesheet" href="/assets/css/styles.css?v=8">
</head>
<body>
  <header id="site-header"></header>
  <main>
    <div class="container">
      <div class="auth-wrap">
        <div class="text-center mb-24">
          <span class="eyebrow eyebrow--plain" style="justify-content:center">Account Recovery</span>
          <h1 class="display mt-8">Forgot Password</h1>
        </div>
        <form class="panel" data-forgot novalidate>
          <p class="text-muted mb-16">Enter your email and we'll send you a secure link to reset your password.</p>
          <div class="field"><label>Email <span class="req">*</span></label><input class="input" name="email" type="email" autocomplete="email" required></div>
          <p class="field-error mb-16" data-error></p>
          <p class="signup-msg mb-16" data-ok></p>
          <button class="btn btn--block btn--lg" type="submit" data-submit>Send Reset Link</button>
          <div class="divider"></div>
          <p class="form-note text-center"><a class="link-underline" href="/login.html">Back to login</a></p>
        </form>
      </div>
    </div>
  </main>
  <footer id="site-footer"></footer>

  <script src="/assets/js/config.js?v=8"></script>
  <script src="/assets/js/api.js?v=8"></script>
  <script src="/assets/js/store.js?v=8"></script>
  <script src="/assets/js/ui.js?v=8"></script>
  <script>
    const form = document.querySelector("[data-forgot]");
    const err = document.querySelector("[data-error]");
    const ok = document.querySelector("[data-ok]");
    form.addEventListener("submit", async (e) => {
      e.preventDefault(); err.textContent = ""; ok.textContent = "";
      const email = form.email.value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { err.textContent = "Enter a valid email."; return; }
      const btn = form.querySelector("[data-submit]");
      btn.setAttribute("data-loading", "1"); btn.disabled = true;
      try {
        const r = await API.auth.forgot(email);
        // Always a generic message — we never reveal whether the email exists.
        ok.textContent = r.message; ok.setAttribute("data-type", "ok");
        form.email.value = "";
      } catch (ex) {
        err.textContent = ex.message || "Something went wrong. Try again.";
      } finally { btn.removeAttribute("data-loading"); btn.disabled = false; }
    });
  </script>
</body>
</html>
