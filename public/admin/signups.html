<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signups — VIGORWOLF Admin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/media/favicon.png?v=8">
  <link rel="stylesheet" href="/assets/css/styles.css?v=8">
</head>
<body>
  <div class="admin-shell">
    <aside id="admin-side"></aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="flex center gap-16">
          <button class="admin-menu-btn" data-admin-menu aria-label="Menu">☰</button>
          <h1>Email Signups</h1>
        </div>
        <a class="btn" href="/api/admin/signups?format=csv" download>Export CSV</a>
      </div>

      <div class="stat-grid" style="grid-template-columns:repeat(auto-fill,minmax(160px,1fr))">
        <div class="stat stat--accent"><div class="k">Total Signups</div><div class="v" data-total>—</div></div>
      </div>

      <div class="table-wrap">
        <table class="data">
          <thead><tr><th>#</th><th>Email</th><th>Source</th><th>Date</th></tr></thead>
          <tbody data-rows><tr><td colspan="4" class="text-muted">Loading…</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/assets/js/config.js?v=8"></script>
  <script src="/assets/js/api.js?v=8"></script>
  <script src="/assets/js/admin.js?v=8"></script>
  <script>
    ADMIN.guard("signups.html", async () => {
      try {
        const { signups } = await API.admin.signups();
        document.querySelector("[data-total]").textContent = signups.length;
        document.querySelector("[data-rows]").innerHTML = signups.length
          ? signups.map((s, i) => `<tr>
              <td class="mono" style="color:var(--muted-2)">${i + 1}</td>
              <td class="mono">${ADMIN.esc(s.email)}</td>
              <td><span class="tag">${ADMIN.esc(s.source || "site")}</span></td>
              <td class="mono" style="color:var(--muted-2);font-size:.75rem">${ADMIN.fmtDate(s.createdAt)}</td></tr>`).join("")
          : `<tr><td colspan="4" class="text-muted">No signups yet.</td></tr>`;
      } catch (e) {
        document.querySelector("[data-rows]").innerHTML = `<tr><td colspan="4" class="text-muted">${e.message}</td></tr>`;
      }
    });
  </script>
</body>
</html>
