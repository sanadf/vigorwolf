<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coupons — VIGORWOLF Admin</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="/assets/media/favicon.png?v=8">
  <link rel="stylesheet" href="/assets/css/styles.css?v=8">
</head>
<body>
  <div class="admin-shell">
    <aside id="admin-side"></aside>
    <main class="admin-main">
      <div class="admin-topbar">
        <div class="flex center gap-16">
          <button class="admin-menu-btn" data-admin-menu aria-label="Menu">☰</button>
          <h1>Coupons</h1>
        </div>
        <button class="btn" data-new>+ New Coupon</button>
      </div>

      <div class="table-wrap">
        <table class="data">
          <thead><tr><th>Code</th><th>Type</th><th>Value</th><th>Min Order</th><th>Uses</th><th>Expires</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody data-rows><tr><td colspan="8" class="text-muted">Loading…</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <div class="modal-back" data-modal>
    <div class="modal">
      <h2 data-modal-title>New Coupon</h2>
      <form data-form>
        <input type="hidden" name="id">
        <div class="form-2col">
          <div class="field"><label>Code <span class="req">*</span></label><input class="input" name="code" style="text-transform:uppercase" required placeholder="PACK10"></div>
          <div class="field"><label>Type</label><select class="select" name="type"><option value="percentage">Percentage (%)</option><option value="fixed">Fixed (JD)</option></select></div>
        </div>
        <div class="form-2col">
          <div class="field"><label>Value <span class="req">*</span> <span class="text-muted">(% or JD)</span></label><input class="input" name="value" type="number" step="0.01" required></div>
          <div class="field"><label>Minimum Order (JD)</label><input class="input" name="minOrderAmount" type="number" step="0.01" value="0"></div>
        </div>
        <div class="form-2col">
          <div class="field"><label>Max Uses <span class="text-muted">(0 = unlimited)</span></label><input class="input" name="maxUses" type="number" value="0"></div>
          <div class="field"><label>Expires <span class="text-muted">(optional)</span></label><input class="input" name="expiresAt" type="date"></div>
        </div>
        <label class="checkline"><input type="checkbox" name="active" checked> Active</label>
        <p class="field-error mb-16" data-modal-error></p>
        <div class="flex gap-16 wrap">
          <button class="btn grow" type="submit" data-save>Save Coupon</button>
          <button class="btn btn--ghost" type="button" data-cancel>Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/assets/js/config.js?v=8"></script>
  <script src="/assets/js/api.js?v=8"></script>
  <script src="/assets/js/admin.js?v=8"></script>
  <script>
    ADMIN.guard("coupons.html", async () => {
      const rowsEl = document.querySelector("[data-rows]");
      const modal = document.querySelector("[data-modal]");
      const form = document.querySelector("[data-form]");
      const errEl = document.querySelector("[data-modal-error]");
      let coupons = [];

      async function load() {
        try {
          coupons = (await API.admin.coupons()).coupons;
          rowsEl.innerHTML = coupons.length ? coupons.map(c => `
            <tr>
              <td class="mono"><b>${ADMIN.esc(c.code)}</b></td>
              <td>${c.type === "percentage" ? "Percentage" : "Fixed"}</td>
              <td class="mono">${c.type === "percentage" ? c.value + "%" : c.value + " JD"}</td>
              <td class="mono">${c.minOrderAmount} JD</td>
              <td class="mono">${c.usedCount}${c.maxUses ? " / " + c.maxUses : ""}</td>
              <td class="mono" style="font-size:.75rem">${c.expiresAt || "—"}</td>
              <td><span class="pill pill--${c.active ? "delivered" : "cancelled"}">${c.active ? "Active" : "Off"}</span></td>
              <td><div class="actions-inline">
                <button class="btn btn--sm btn--ghost" data-edit="${c.id}">Edit</button>
                <button class="btn btn--sm btn--ghost" data-del="${c.id}" data-danger>Delete</button>
              </div></td>
            </tr>`).join("") : `<tr><td colspan="8" class="text-muted">No coupons yet. Create one (e.g. PACK10).</td></tr>`;
        } catch (e) { rowsEl.innerHTML = `<tr><td colspan="8" class="text-muted">${e.message}</td></tr>`; }
      }

      function openModal(c) {
        errEl.textContent = ""; form.reset();
        document.querySelector("[data-modal-title]").textContent = c ? "Edit Coupon" : "New Coupon";
        form.id.value = c ? c.id : "";
        if (c) {
          form.code.value = c.code; form.type.value = c.type; form.value.value = c.value;
          form.minOrderAmount.value = c.minOrderAmount; form.maxUses.value = c.maxUses;
          form.expiresAt.value = (c.expiresAt || "").slice(0, 10); form.active.checked = !!c.active;
        }
        modal.setAttribute("data-open", "1");
      }
      const close = () => modal.setAttribute("data-open", "0");
      document.querySelector("[data-new]").addEventListener("click", () => openModal(null));
      document.querySelector("[data-cancel]").addEventListener("click", close);
      modal.addEventListener("click", (e) => { if (e.target === modal) close(); });

      rowsEl.addEventListener("click", async (e) => {
        const edit = e.target.closest("[data-edit]");
        const del = e.target.closest("[data-del]");
        if (edit) openModal(coupons.find(c => c.id == edit.getAttribute("data-edit")));
        if (del) {
          if (!confirm("Delete this coupon?")) return;
          try { await API.admin.deleteCoupon(del.getAttribute("data-del")); await load(); } catch (ex) { alert(ex.message); }
        }
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault(); errEl.textContent = "";
        const btn = document.querySelector("[data-save]");
        btn.setAttribute("data-loading", "1"); btn.disabled = true;
        const payload = {
          code: form.code.value.trim(), type: form.type.value, value: form.value.value,
          minOrderAmount: form.minOrderAmount.value, maxUses: form.maxUses.value,
          expiresAt: form.expiresAt.value, active: form.active.checked,
        };
        try {
          if (form.id.value) await API.admin.updateCoupon(form.id.value, payload);
          else await API.admin.createCoupon(payload);
          close(); await load();
        } catch (ex) { errEl.textContent = ex.message; }
        finally { btn.removeAttribute("data-loading"); btn.disabled = false; }
      });

      await load();
    });
  </script>
</body>
</html>
