  <link rel="icon" type="image/png" href="/assets/media/favicon.png?v=9">
  <link rel="stylesheet" href="/assets/css/styles.css?v=9">

<body>
  <header id="site-header"></header>
  <main>
    <div class="container">
      <div class="auth-wrap">
        <div class="text-center mb-24">
          <span class="eyebrow eyebrow--plain" style="justify-content:center">Welcome Back</span>
          <h1 class="display mt-8">Enter the Pack</h1>
        </div>
        <form class="panel" data-login novalidate>
          <div class="field"><label>Email <span class="req">*</span></label><input class="input" name="email" type="email" required></div>
          <div class="field">
            <label>Password <span class="req">*</span></label>
            <input class="input" name="password" type="password" required>
            <p style="text-align:right;margin-top:6px"><a class="link-underline" href="/forgot-password.html" style="font-size:.72rem">Forgot password?</a></p>
          </div>
          <p class="field-error mb-16" data-error></p>
          <button class="btn btn--block btn--lg" type="submit">Login</button>
          <div class="divider"></div>
          <p class="form-note text-center">No account? <a class="link-underline" href="/register.html">Join the Pack</a></p>
        </form>
      </div>
    </div>
  </main>
  <footer id="site-footer"></footer>

  <script src="/assets/js/config.js?v=9"></script>
  <script src="/assets/js/api.js?v=9"></script>
  <script src="/assets/js/store.js?v=9"></script>
  <script src="/assets/js/ui.js?v=9"></script>
  <script>
    if (VW.User.isLoggedIn()) location.href = "/profile.html";
    const form = document.querySelector("[data-login]");
    const err = document.querySelector("[data-error]");
    form.addEventListener("submit", async (e) => {
      e.preventDefault(); err.textContent = "";
      const btn = form.querySelector("button[type=submit]");
      btn.setAttribute("data-loading", "1"); btn.disabled = true;
      try {
        await VW.User.login(form.email.value.trim(), form.password.value);
        const next = new URLSearchParams(location.search).get("next");
        location.href = next || "/profile.html";
      } catch (ex) {
        err.textContent = ex.message || "Invalid email or password.";
        btn.removeAttribute("data-loading"); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
