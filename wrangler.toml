# ============================================================================
#  VIGORWOLF ??? Cloudflare Pages + Functions + D1 configuration
# ============================================================================
#  This file tells Cloudflare which D1 database to bind to your Pages
#  Functions. You normally deploy the frontend by connecting the Git repo in
#  the Cloudflare dashboard, but this file is required for local dev
#  (`npm run dev`) and for binding D1.
#
#  After you create your D1 database (see README > Deployment), paste the
#  database_id it gives you into the `database_id` field below.
# ============================================================================

name = "vigorwolf"
pages_build_output_dir = "public"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

# --- D1 database binding -----------------------------------------------------
# The code refers to this database as `env.DB`.
[[d1_databases]]
binding = "vigorwolf_db"
database_name = "vigorwolf-db"
database_id = "9deb43a7-fb8e-4a4a-ab40-4771aa62f66a"

# --- Environment variables (safe defaults; secrets set in dashboard) ---------
# These non-secret vars can live here. SECRETS (email keys, session secret)
# should be added in the Cloudflare dashboard: Pages > Settings > Variables.
[vars]
SITE_NAME = "VIGORWOLF"
# Canonical public site URL — used to build customer-facing links (e.g. password
# reset emails) so the backend never hardcodes a *.pages.dev URL.
SITE_URL = "https://vigorwolf.co"
# Shown in Admin → Dashboard "Environment" line. Local dev auto-detects via
# hostname; this labels the deployed environment.
ENVIRONMENT = "production"
# Where order/contact/signup notifications are emailed:
NOTIFY_EMAIL = "vigorwolf1@gmail.com"
# EMAIL_PROVIDER can be "resend", "web3forms", or "" (disabled -> saved to D1 only)
EMAIL_PROVIDER = "resend"
# Admin login. Logging in with these once auto-creates/repairs the admin account.
# Change the email here; for the PASSWORD set a secret in the dashboard
# (npx wrangler pages secret put ADMIN_PASSWORD) or it defaults to VigorWolfAdmin123.
ADMIN_EMAIL = "vigorwolf1@gmail.com"

# ----------------------------------------------------------------------------
#  SECRETS / dashboard values - DO NOT put real keys here. Set them in the
#  Cloudflare dashboard (Pages > Settings > Variables and Secrets):
#    SESSION_SECRET   (secret) - long random string; signs login/admin sessions
#    RESEND_API_KEY   (secret) - from resend.com
#    RESEND_FROM      (var)    - "VIGORWOLF <no-reply@vigorwolf.co>"
#                               ONLY after the domain is verified in Resend;
#                               until then leave it unset (defaults to
#                               onboarding@resend.dev, which reaches your own
#                               inbox for order alerts but NOT customers).
# ----------------------------------------------------------------------------
